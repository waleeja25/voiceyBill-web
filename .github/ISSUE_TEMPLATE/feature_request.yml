name: Feature request
description: Propose an improvement with clear scope and acceptance criteria
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing an enhancement. The clearer this request is, the faster it can be evaluated.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
      placeholder: I cannot easily ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe your ideal solution.
      placeholder: We could add ...
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: Expected impact
      options:
        - High (core user value)
        - Medium (important improvement)
        - Low (nice to have)
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - UI and UX
        - State management
        - API integration
        - Performance
        - Accessibility
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative approaches you considered.

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Define what done looks like.
      placeholder: |
        - [ ] Users can ...
        - [ ] No regressions on ...
        - [ ] Docs updated
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Additional context
      description: Links, screenshots, mockups, videos, or examples.
      placeholder: |
        - Mockup or reference image
        - Screen recording
        - Example implementation

  - type: textarea
    id: media
    attributes:
      label: Images or videos
      description: Attach visual references directly in GitHub or paste links here.
      placeholder: Link to screenshots, a GIF, or a video walkthrough.

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I explained why this is valuable for the project.
          required: true
